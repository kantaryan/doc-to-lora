# Podcast 360 pilot config (custom Doc-to-LoRA training)

# model
model_name_or_path: google/gemma-2-2b-it

# LoRA
lora_r: 8
lora_dropout: 0.0
target_modules:
  - down_proj

# hypernet / aggregator
ctx_encoder_type: per_layer_activations
n_latent_queries: 8
num_blocks: 8
num_self_attn_per_block: 0

# data generated by: data/self_generate_qa.py --glob_pattern .../podcast360_compact/*/ds.parquet
# NOTE: with --glob_pattern flow, output path includes split twice:
# .../podcast360_compact/<split>/<split>/*.parquet
train_ds_names:
  - self_gen/google/gemma-2-2b-it_temp_0.0_closed_qa_prob_1.0/podcast360_compact/train/train/*.parquet

val_ds_names:
  - self_gen/google/gemma-2-2b-it_temp_0.0_closed_qa_prob_1.0/podcast360_compact/validation/validation/*.parquet

# training runtime
use_kl_loss: true
use_per_ctx_average_loss: true
per_rank_gen: true
per_layer_processing: true
gen_lora_l1_reg_coef: 0.1

gradient_accumulation_steps: 8
max_steps: 12000
learning_rate: 4e-5

max_qas_len: 2048
max_qas_per_sample: 1
max_packed_inp_len: 4096
max_packed_ctx_len: 4096

quantize_ctx_encoder: true
eval_strategy: steps
eval_steps: 500
save_steps: 1000
logging_steps: 25
